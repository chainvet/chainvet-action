# Copy to .github/workflows/chainvet.yml in your Solidity project.
name: Chainvet
on:
  push:
    branches: [main]
  pull_request:

permissions:
  security-events: write
  contents: read

jobs:
  chainvet:
    name: Chainvet scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: chainvet/chainvet-action@v1
        with:
          path: contracts
          mode: hybrid
          fail-on-severity: high
